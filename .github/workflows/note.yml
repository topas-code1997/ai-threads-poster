name: note Article Generator & Publisher

on:
  schedule:
    # 毎日 10:00 JST (= 01:00 UTC)
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザをインストール
        run: playwright install chromium --with-deps

      - name: note記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python note_post.py

      - name: noteに自動投稿
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python note_publish.py

      - name: 生成記事とスクリーンショットをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-article-${{ github.run_id }}
          path: |
            note_article_*.md
            note_*.png
          retention-days: 30
